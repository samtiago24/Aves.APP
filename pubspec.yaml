name: aves_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.12.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  image_picker: ^1.2.1
  geolocator: ^14.0.2
