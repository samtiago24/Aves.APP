  uuid: ^4.5.3
  google_maps_flutter: ^2.17.0
  url_launcher: ^6.3.1
  # Firebase (RF09 - Sincronización en la nube)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
